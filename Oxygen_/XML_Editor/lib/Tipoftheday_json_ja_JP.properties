Tip.19.helpID=設定-エディタ-スペルチェック
Tip.2.text=開発者であれば、プラグインやフレームワークをWebサイトでアドオンとして公開することで、他のユーザーに配布できます。ユーザーは、oXygenにリポジトリのURLを指定するだけで、新しいプラグインやフレームワークを簡単にインストールできます。利用可能なプラグインやフレームワークを参照し、インストールしたいものを選択できます。アドオンが変更されると、oXygenで更新通知がトリガーされます。
Tip.5.text=通常はコマンドラインから起動する外部ツールを設定するために、いくつかのエディタ変数（マクロ）が利用可能です。設定後は、各ツールをワンクリックで起動し、出力とエラーをアプリケーションウィンドウ内の別々の結果ペインで確認できます。
Tip.8.text=編集中のドキュメントはバックグラウンドで継続的に検証され、エラーは自動的に下線表示され、エディタパネル右側の概要ルーラーにマーカーが追加されます。概要ルーラーのマーカーをクリックすると、エラーの場所に直接移動できます。
Tip.22.text=ドキュメントテンプレートを簡単に追加して、新しいドキュメントの作成に使用できます。
Tip.25.text=プロジェクトから選択したファイルに対してバッチ検証を実行できます。
Tip.3.helpID=ラージファイルビューアー
Tip.5.helpID=エディタ変数
Tip.28.text=多くのエディタアクションのキーバインドは、オプション/設定 / メニューショートカットキーオプションペインから設定できます。
Tip.11.text=テキストモードでエディタを分割して、同じファイルの2つのビューを並べて表示できます。これにより、ファイル内の特定の場所で編集しながら、同じファイルの別の場所からコンテンツをコピーできます。エディタを分割または分割解除するには、テキストエディタモードのポップアップメニューでも利用できる「分割」ツールバーボタンを使用します。
Tip.7.helpID=設定-フォント
Tip.14.text=検証やさまざまな検索操作では、結果をツリーテーブルレイアウトで表示し、異なる基準に基づいて結果をグループ化できます。
Tip.17.text=情報ビューは、整形式チェック、検証、入力中検証、変換などのアクションによって発行された情報ステータスメッセージのログです。このビューは、アクションの開始や終了などのイベントと、検証に使用されたスキーマやエラー数などのデータを記録します。各イベントの時刻も記録されます。ビューは、ウィンドウ → ビューの表示 → 情報から画面に表示されます。
Tip.1.helpID=フォームコントロール
Tip.33.text=検索/置換ダイアログで「インクリメンタル」オプションを有効にすると、テキストパターンをインクリメンタルに検索できます。
Tip.30.text=ディレクトリ比較ツールとファイル比較ツールを使用すると、プロジェクトの異なるバージョン間の変更を簡単に追跡でき、ファイルの比較、マージ、コピーに適した機能を提供します。
Tip.27.helpID=設定-色-構文ハイライト
Tip.26.helpID=スペルチェックの使用
Tip.28.helpID=設定-メニューショートカットキー
Tip.9.helpID=設定-CSSバリデータ
Tip.25.helpID=プロジェクトビューの使用
Tip.29.helpID=プロキシ設定
Tip.20.text=テキストモードでドキュメントを作成する場合は、オプション/設定/エディタ/フォーマット/ハード行折り返しオプションを有効にすると簡単です。これにより、現在編集中のテキスト行の長さが整形印刷の制限値に制限され、制限値に達すると自動的にカーソルが新しい行に移動します。
Tip.26.text=手動スペルチェックは、編集 → スペルチェックメニューで利用できます。
Tip.6.text=キーボードにないUnicode文字を挿入するには、Unicodeツールバーとメニュー編集 → 文字マップから挿入にある文字マップダイアログを使用します。これにより、文字のコードとして直接、またはコードを使用した文字エンティティとして文字を挿入できます。
Tip.0.text=リソースを開く/検索機能を使用すると、プロジェクト内のリソースを、そのコンテンツ内の検索または名前の検索のいずれかで簡単に見つけることができます。この機能を使用して、単純なテキスト検索だけでなく、Apache Lucene - クエリパーサー構文を使用した、ブール検索、XML検索などのより複雑な検索も実行できます。
Tip.18.text=プロパティビューは、現在編集中のドキュメントに関する情報を表示します\: ファイルのパス、コンテンツタイプ、エンコーディング、文字数、方向（左から右または右から左）、インデントサイズ、関連付けられたドキュメントタイプなど。ビューは、ウィンドウ → ビューの表示 → プロパティから画面に表示されます。
Tip.34.text=ドキュメント内にスキーマが指定されていない場合でも、「検証対象を選択...」ツールバーボタンを使用するか、オプション → 設定 / エディタ / ドキュメントタイプ関連付けで定義されたデフォルトのスキーマ関連付けを使用して、スキーマに対して検証することが可能です。
Tip.20.helpID=設定-エディタ-フォーマット
Tip.21.helpID=FTP/WebDAVの開く/保存
Tip.12.text=動的略語は、ドキュメント内に既に存在するすべての単語をインデックス化することで機能します。接頭辞を入力し、キーボードのCtrl+Spaceを押すと、その接頭辞で始まる単語がコンテンツ入力支援ウィンドウに表示されます。この機能はデフォルトでは無効ですが、オプション → エディタ/コンテンツ入力支援 / 機能 → 単語を学習（動的略語）から有効にできます。
Tip.22.helpID=新規ドキュメントの作成
Tip.23.helpID=ファイル内のテキストを検索/置換
Tip.24.helpID=既存ドキュメントを開く
Tip.35.text=CJK（中国語、日本語、韓国語）入力方式の完全なサポートは、テキストモード、グリッドモード、オーサーモードのすべてで利用できます。入力方式は、挿入された文字がCJKコードページに属する場合、構成中のテキストを表示するスポットポップアップウィンドウを表示します。構成中のテキストは、最終的に属することになるドキュメントのコンテキスト内でエディタに表示され、そのテキストがまだ変換されるかユーザーによって確定される必要があることを示すスタイルで表示されます。
Tip.10.text=oXygenのビューは、ドッキング可能でフローティングにもできます。メインレイアウト内の任意の位置だけでなく、メインレイアウトの外側に別のウィンドウとしてドラッグすることもできます。また、「分割」ツールバーボタンを使用して、編集エリアを2つ以上のエディタに分割できます。初期レイアウトに戻すには、ウィンドウ → レイアウトのリセットに進みます。
Tip.13.text=使用するフォントは、エディタだけでなく、GUIテキストコンポーネントやその他のGUIコンポーネントについても、「フォント」設定ページから設定できます。これにより、ノートパソコンのような非常に小さいdpiファクターの設定でも、ユーザーフレンドリーでアクセスしやすいアプリケーションを実現できます。
Tip.27.text=編集中のドキュメントにはすべて、構文カラースキームがあります。各スキームの色は、オプション/設定 / エディタ / 色から設定できます。
Tip.19.text=スペルミスをその場でチェックして修正します。オプション → 設定 / エディタ / スペルチェック → 自動スペルチェックで自動スペルチェックを有効にします。スペルミスの単語が強調表示されたら、その単語を右クリックしてスペルチェックサブメニューに進み、単語を学習するか、提案のいずれかと置き換えます。
Tip.24.text=最後に作業したドキュメントを開くには、ファイル→最後に閉じたエディタを再度開くをクリックします。
Tip.16.text=<oXygen/>で開くSVG、GIF、JPG、PNG、BMP画像は、プレビューパネルに表示されます。
Tip.21.text=リモート編集は、HTTPおよびHTTPS上のSFTPとWebDAVを介してサポートされています。
Tip.7.text=現在編集中のドキュメントのフォントサイズをすばやく変更するには、Ctrl+テンキーのプラス（+）を押して拡大するか、Ctrl+テンキーのマイナス（-）を押して縮小するか、同等のCtrl+マウスホイールスクロールショートカットを使用します。
Tip.2.helpID=アドオンのインストールと更新
Tip.4.helpID=検索/置換ダイアログ
Tip.1.text=oxy_editor CSS拡張関数を使用すると、オーサーモードでフォームベースのコントロールを使用して、属性と要素のテキスト値を直接編集できます。様々な実装が標準で利用可能です\: コンボボックス、チェックボックス、テキストフィールド、ポップアップ、カスタムオーサーアクションやURL選択ツールを呼び出すボタンなど。カスタムエディタを実装することもできます。
Tip.8.helpID=自動検証
Tip.6.helpID=Unicodeツールバー
Tip.0.helpID=リソースを開く/検索ビュー
Tip.4.text=検索/置換ダイアログは、大文字と小文字を区別、XMLタグ内を検索、インクリメンタルサーチ、前方/後方方向、検索範囲を制限するXPathフィルターなどのオプションで調整できる、複数行の正規表現検索が可能です。
