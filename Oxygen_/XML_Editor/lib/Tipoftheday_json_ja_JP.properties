Tip.15.text=マウスの中ボタンでエディタをクリックすると閉じることができます。
Tip.31.helpID=テキスト-ドキュメントコンテンツのナビゲート
Tip.32.text=要素にカーソルを置いて、そのインデントを修正できます。コンテキストメニュー/ソースの「要素をプリティプリント」アクションを参照してください。これは、ドキュメント内の他の要素のインデントを変更したくない場合に便利です。
Tip.15.helpID=ドキュメントを閉じる
Tip.9.text=CSS検証では、CSS2、CSS3などの異なるプロファイルと、例えば点字やスクリーンなどの異なるメディアタイプがサポートされています。文書化されている特定のブラウザ拡張はすべて、デフォルトで検証とコンテンツ入力支援でサポートされています。
