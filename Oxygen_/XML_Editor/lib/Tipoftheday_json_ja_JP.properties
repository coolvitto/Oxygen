Tip.3.text=最大2ギガバイトの巨大なXMLファイルを表示および検索するには、ツール → ラージファイルビューアーメニューに進みます。
Tip.32.helpID=テキストモードアクション
Tip.23.text=検索→ファイル内の検索/置換オプションを使用して、複数のファイルを同時に検索および置換できます。置換正規表現では、Perl 5のような一致文字のグループを使用できます。
Tip.29.text=プロキシを介したWebサイトへのアクセスは、オプション/設定 / HTTP(S)/SFTP/プロキシ設定から設定できます。
Tip.11.helpID=ドッキング可能なビューとエディタ
