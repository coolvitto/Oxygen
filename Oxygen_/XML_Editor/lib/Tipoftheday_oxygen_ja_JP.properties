Tip.37.text=単一のアクションを使用して複数のドキュメントを変換することができます。すべてのドキュメントに同じ変換シナリオを使用して変換するには、プロジェクトビューでドキュメントを選択し、ビューのポップアップメニューで「変換シナリオを適用」をクリックします。関連付けられた変換シナリオを各ドキュメントに適用するには、プロジェクトビューでドキュメントを選択し、同じポップアップメニューで利用可能な「変換シナリオを適用」アクションを実行します。
