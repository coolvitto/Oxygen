Tip.83.text=XSLTプロファイラーは、XSLT変換のパフォーマンス問題を見つけて修正するのに役立ちます。これはXSLTデバッガーパースペクティブで利用可能で、デバッガーツールバーの時計のようなボタンを使用して有効にできます。
