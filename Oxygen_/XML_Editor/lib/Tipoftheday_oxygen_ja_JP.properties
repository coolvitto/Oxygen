Tip.38.text=XQuery変換をデバッグするには、ウィンドウ → パースペクティブを開く → XQueryデバッガーからXQueryデバッガーパースペクティブに切り替えます。動的に更新される多くの特殊なビューが、変換の問題を迅速に特定するのに役立ちます。
Tip.55.text=XSL変換でSVG結果が生成される場合、統合されたSVGレンダラーを使用してそれを確認できます。「シナリオの編集」ダイアログの「出力」タブで「SVG」チェックボックスを選択する必要があります。SVGビューアーはツールメニューにもあります。既存のSVGファイルを開くために使用できます。
Tip.5.text=oxy_editor CSS拡張関数を使用すると、オーサーモードでフォームベースのコントロールを使用して、属性と要素のテキスト値を直接編集できます。様々な実装が標準で利用可能です\: コンボボックス、チェックボックス、テキストフィールド、ポップアップ、カスタムオーサーアクションやURL選択ツールを呼び出すボタンなど。カスタムエディタを実装することもできます。
Tip.69.text=プロジェクトから選択したファイルに対してバッチ検証を実行できます。
