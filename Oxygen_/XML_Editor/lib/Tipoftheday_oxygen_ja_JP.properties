Tip.29.text=XSLTスタイルシートやXPathツールバーでXPath値を編集する際、コンテキストに応じたコンテンツ入力支援が利用できます。アプリケーションは、その特定のスタイルシートコンテキストで利用可能な要素、属性、関数、軸、変数などを提供します。
Tip.92.text=データベース接続を設定して、データベースコレクションを参照し、WebDAV経由で読み取り/書き込みモードでデータにアクセスできます。WebDAVインターフェースを持つ任意のデータベースはOxygenでアクセスできます。例えば、組み込みサポートが提供されているMarkLogicなどです。
Tip.15.text=データベースからエクスポートされたXMLドキュメントをグリッドモードで開き、表形式で編集します。
Tip.9.text=開発者であれば、プラグインやフレームワークをWebサイトでアドオンとして公開することで、他のユーザーに配布できます。ユーザーは、oXygenにリポジトリのURLを指定するだけで、新しいプラグインやフレームワークを簡単にインストールできます。利用可能なプラグインやフレームワークを参照し、インストールしたいものを選択できます。アドオンが変更されると、oXygenで更新通知がトリガーされます。
Tip.62.text=ドキュメントテンプレートを簡単に追加して、新しいドキュメントの作成に使用できます。
Tip.44.text=コンテンツ入力支援アシスタントは、候補リストで選択された提案の注釈を表示します。XML Schema 1.0または1.1に基づくドキュメントの場合、oXygenは、要素または属性に注釈がない場合、要素タイプまたは属性タイプの型階層を必要に応じて深く検索し、選択されたコンテンツ入力支援候補の横に最初に見つかった注釈を表示します。
Tip.77.text=プロキシを介したWebサイトへのアクセスは、オプション/設定 / HTTP(S)/SFTP/プロキシ設定から設定できます。
Tip.58.text=<oXygen/>は、幅広いスキーマ言語に対して整形式と妥当性をチェックできます\: XML Schema 1.0および1.1、Relax NG（フルおよびコンパクト構文）スキーマ、NVDLスキーマ、DTD。
Tip.63.text=ファイル→新規作成ダイアログを使用して、DTDまたはXML Schema 1.0/1.1に基づくXMLドキュメントを簡単に作成できます。
