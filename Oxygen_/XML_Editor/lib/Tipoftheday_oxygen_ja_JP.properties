Tip.41.text=oXygenのビューは、ドッキング可能でフローティングにもできます。メインレイアウト内の任意の位置だけでなく、メインレイアウトの外側に別のウィンドウとしてドラッグすることもできます。また、「分割」ツールバーボタンを使用して、編集エリアを2つ以上のエディタに分割できます。初期レイアウトに戻すには、ウィンドウ → レイアウトのリセットに進みます。
