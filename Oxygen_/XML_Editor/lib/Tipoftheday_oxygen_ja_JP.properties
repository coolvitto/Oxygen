Tip.6.helpID=サポートされているXSLTプロセッサ
Tip.82.helpID=テキスト-ドキュメントコンテンツのナビゲート
Tip.106.text=Microsoft Word、OpenOffice Writer、またはWebブラウザからOxygen Authorにコピー＆ペーストすることで、ドキュメントのコンテンツをすばやく転送できます。オーサーモードに貼り付けると、可能な限り書式が保持されます。また、Microsoft ExcelやOpenOffice Calcからオーサーモードに表をコピー＆ペーストすると、表の書式が保持されます。
