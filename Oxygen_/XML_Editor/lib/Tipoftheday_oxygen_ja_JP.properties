Tip.5.helpID=フォームコントロール
Tip.14.text=NVDLスキーマを作成し、それをXMLドキュメントに関連付けることで、異なるターゲット名前空間を持つ複数のスキーマ、または異なるスキーマ言語（W3C XML Schema 1.0/1.1、RELAX NG、Schematron）で記述された複雑な制約を持つドキュメントを検証できます。
Tip.65.helpID=XMLのフォーマットとインデント
Tip.33.text=現在のファイル内のXSLTコンポーネントのすべての宣言と参照をすばやく見つけるには、XSLTエディタパネルのポップアップメニューの検索サブメニューで利用可能な「ファイル内の出現箇所」アクションを使用できます。アクションのショートカットは、オプション → 設定 → メニューショートカットキーから設定します。
Tip.70.helpID=XSL-FOプロセッサ
Tip.76.helpID=設定-エンコーディング
Tip.78.helpID=コンテンツ入力支援で効率化
Tip.105.text=コンテキストメニューから「コンポーネントの依存関係」アクションを使用して、選択したパターンを参照するRelax NGパターンを調べることができます。結果ツリーを展開して、参照元のパターンがどこから使用されているかを確認できます。
Tip.26.helpID=ユーザーインターフェースの検証アクション
Tip.29.helpID=XPath式のコンテンツ入力支援
Tip.62.helpID=新規ドキュメントの作成
Tip.81.text=カタログマネージャーがパブリックIDとシステムIDをどのように解決するかを確認するには、XMLカタログオプションペインで「詳細出力」チェックボックスを選択してその出力を有効にできます。これにより、どのカタログファイルが使用されているかを確認することもできます。
Tip.40.helpID=設定-エディタ-スキーマ
Tip.43.helpID=設定-コンテンツ入力支援
Tip.48.helpID=画像プレビュー
Tip.34.text=「出現箇所の名前変更」リファクタリングはXSLTスタイルシートで利用可能で、変数、テンプレート、関数などのXSLTコンポーネントの名前を変更できます。変更を保存する前にすべての変更を表示する差分ビューで変更されたファイルが表示されるため、変更を完全に制御できます。リファクタリングのスコープは、現在のファイル、プロジェクト、またはすべてのインポート/インクルードファイルにすることができます。これはXSLリファクタリングツールバーとXSLTエディタパネルのポップアップメニューで利用できます。
Tip.87.text=XSLTデバッガーパースペクティブまたはXQueryデバッガーパースペクティブにあるブレークポイントに条件を設定して、条件が真の場合にのみそのポイントで処理を停止します。
Tip.82.text=ブックマークは現在のプロジェクトに関連付けられており、編集セッション間で永続的です。
Tip.21.helpID=設定-プレフィックスごとの要素の色
Tip.43.text=動的略語は、ドキュメント内に既に存在するすべての単語をインデックス化することで機能します。接頭辞を入力し、キーボードのCtrl+Spaceを押すと、その接頭辞で始まる単語がコンテンツ入力支援ウィンドウに表示されます。この機能はデフォルトでは無効ですが、オプション → エディタ/コンテンツ入力支援 / 機能 → 単語を学習（動的略語）から有効にできます。
Tip.88.text=ドキュメント内にスキーマが指定されていない場合でも、「検証対象を選択...」ツールバーボタンを使用するか、オプション → 設定 / エディタ / ドキュメントタイプ関連付けで定義されたデフォルトのスキーマ関連付けを使用して、スキーマに対して検証することが可能です。
Tip.49.text=情報ビューは、整形式チェック、検証、入力中検証、変換などのアクションによって発行された情報ステータスメッセージのログです。このビューは、アクションの開始や終了などのイベントと、検証に使用されたスキーマやエラー数などのデータを記録します。各イベントの時刻も記録されます。ビューは、ウィンドウ → ビューの表示 → 情報から画面に表示されます。
Tip.104.text=コンテキストメニューから「コンポーネントの依存関係」アクションを使用して、選択したコンポーネントを参照するXML Schema 1.0または1.1コンポーネントを調べることができます。例えば、スキーマ型がどこで使用されているかをすばやく確認できます。
Tip.24.text=スキーマダイアグラムビューのポップアップメニューで利用可能な「画像として保存」アクションを使用して、XML Schema 1.0/1.1またはRelax NGスキーマのダイアグラム状態のスナップショットを撮ります。
Tip.97.text=XPathスキーマ対応式は、XPathビルダービューとXPathツールバーを使用して実行できます。式の種類に「XPath 2.0/3.1 SA」を選択するだけです。
Tip.59.helpID=スキーマ言語間の変換
Tip.78.text=コンテンツ入力支援で要素と属性に関する追加情報を提供するには、XML Schema 1.0および1.1の開発者がスキーマドキュメント内で「xs\:annotation」要素を使用して注釈を追加する必要があります。
Tip.84.helpID=インポートの概要
Tip.95.helpID=アーカイブファイルの編集
Tip.72.text=手動スペルチェックは、編集 → スペルチェックメニューで利用できます。
Tip.73.helpID=設定-色-構文ハイライト
Tip.59.text=スキーマ言語間のいくつかの変換がサポートされています\: DTD、Relax NGスキーマ（フルまたはコンパクト構文）、またはXMLドキュメントのセットを、XMLスキーマ、Relax NGスキーマ（フルまたはコンパクト構文）、またはDTDに変換できます。ツール / スキーマの生成/変換を確認してください。
Tip.8.helpID=オーサーコールアウト
Tip.0.helpID=メインファイルの定義
Tip.4.text=SharePointリポジトリへのアクセスは簡単に使用できます。ホストアドレス、ユーザー名、パスワードを指定してSharePoint接続を設定するだけで、チェックアウト、ロック、編集、チェックインなどの操作でリモートコンテンツの編集を開始できます。
Tip.91.text=CJK（中国語、日本語、韓国語）入力方式の完全なサポートは、テキストモード、グリッドモード、オーサーモードのすべてで利用できます。入力方式は、挿入された文字がCJKコードページに属する場合、構成中のテキストを表示するスポットポップアップウィンドウを表示します。構成中のテキストは、最終的に属することになるドキュメントのコンテキスト内でエディタに表示され、そのテキストがまだ変換されるかユーザーによって確定される必要があることを示すスタイルで表示されます。
Tip.70.text=<oXygen/>にはApache FOPプロセッサがバンドルされているため、他のソフトウェアをインストールしなくてもPDFまたはPSドキュメントを生成できます。
Tip.102.helpID=RNG階層ビュー
Tip.53.helpID=設定-エディタ-フォーマット
Tip.51.helpID=設定-エディタ-スペルチェック
Tip.84.text=データベースコンテンツ、Microsoft Excelシート、およびレガシーテキストデータファイル（カンマ区切り値など）をXMLドキュメントにインポートできます。接続可能なのは\: Oracle、IBM DB2、Microsoft SQL Server、MySQL、またはJDBC接続をサポートするその他のデータベースサーバー。
Tip.100.helpID=XMLスキーマ階層
