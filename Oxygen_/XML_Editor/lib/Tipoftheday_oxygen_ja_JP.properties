Tip.36.text=XSLTスタイルシートで利用可能な「選択範囲からテンプレートを作成」リファクタリングアクションを使用して、選択範囲を名前付きテンプレートに配置し、それをcall-template命令に置き換えます。選択範囲内で使用されている変数とパラメータは、テンプレートパラメータとして渡されます。このリファクタリングアクションは、XSLリファクタリングツールバーとXSLTエディタのポップアップメニューで利用できます。
