Tip.68.text=最後に作業したドキュメントを開くには、ファイル→最後に閉じたエディタを再度開くをクリックします。
Tip.105.helpID=RNGコンポーネント依存関係
Tip.23.text=編集中のドキュメントに関連付けられたXML Schema 1.0/1.1、Relax NGスキーマ、またはDTDで定義された注釈は、コンテンツ入力支援アシスタントとモデルビューでツールチップとして表示されます。現在の要素/属性がスキーマで注釈付けされていない場合、<oXygen/>は型定義、型定義の親定義などから注釈を検索します。スキーマ注釈の標準構文については、ユーザーマニュアル（ヘルプ → ヘルプ）を参照してください。
