Tip.20.text=キーボードにないUnicode文字を挿入するには、Unicodeツールバーとメニュー編集 → 文字マップから挿入にある文字マップダイアログを使用します。これにより、文字のコードとして直接、またはコードを使用した文字エンティティとして文字を挿入できます。
Tip.48.text=<oXygen/>で開くSVG、GIF、JPG、PNG、BMP画像は、プレビューパネルに表示されます。
Tip.26.text=デフォルトでは、XMLドキュメントの検証に使用される文法は、処理を高速化するためにキャッシュされます。「検証（キャッシュ）」ツールバーアクションを使用して、検証、コンテンツ入力支援、カタログのキャッシュを再構築します。
