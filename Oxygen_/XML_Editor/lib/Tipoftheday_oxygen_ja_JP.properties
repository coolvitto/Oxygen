Tip.18.text=編集中のスタイルシートのすべてのxsl\:template命令のリストは、アウトラインビューで利用できます。ビューはエディタパネルとリアルタイムで同期され、テンプレートのname、match、mode属性の列を持つソート可能なテーブルが含まれています。ビューはウィンドウ → ビューの表示から開きます。
Tip.50.text=プロパティビューは、現在編集中のドキュメントに関する情報を表示します\: ファイルのパス、コンテンツタイプ、エンコーディング、文字数、方向（左から右または右から左）、インデントサイズ、関連付けられたドキュメントタイプなど。ビューは、ウィンドウ → ビューの表示 → プロパティから画面に表示されます。
Tip.47.helpID=ドキュメントを閉じる
Tip.12.text=最大2ギガバイトの巨大なXMLファイルを表示および検索するには、ツール → ラージファイルビューアーメニューに進みます。
Tip.65.text=様々な行幅やインデントサイズに従って、XMLドキュメントを整形印刷できます。空要素を展開するかどうか、属性をアルファベット順にソートするかドキュメントの元の順序を保持するかを指定できます。空白を保持または削除する要素名の独自のリストを作成することもできます。
Tip.22.helpID=設定-フォント
Tip.27.text=多くの検証エンジンを使用してドキュメントを検証できます\: Xerces、libxml、Saxon Enterprise Edition。これらはオプション → 設定 / エディタ / カスタム検証で設定します。ここで独自のバリデータを追加および設定できます。
Tip.94.text=Office Open XML / MS Office 2007ドキュメント（Word文書、Excelワークブック、PowerPointプレゼンテーション）に保存されているXMLデータは、OOXMLドキュメントから直接抽出、検証、編集、およびXSLTまたはXQueryで他の形式に変換できます。ドキュメントは、「アーカイブブラウザ」と呼ばれる特別なビューでファイルツリー構造として表示され、参照できます。
Tip.99.helpID=オーサー変更履歴
Tip.21.text=テキストモードでXML要素と属性を、そのプレフィックスに応じて異なる色で表示します。色の追加、編集、削除は、オプション → 設定 → 色 / プレフィックスごとの要素/属性に進んで行います。
Tip.7.text=XSLT 3.0およびXQuery 3.0仕様はXPath 3.0に基づいているため、oXygenはXPathサポートを更新してXPath 3.0の新機能をカバーしています。新しいXPathビルダーを使用すると、XPath 3.0式を編集および実行できます。
