Tip.79.text=モデルビューは、ドキュメントの要素と属性に関するスキーマ関連情報を提供します\: コンテンツモデル、要素タイプ、属性、属性タイプと制約、注釈。
Tip.46.helpID=エディタパースペクティブ
Tip.96.text=ZIPアーカイブは、ファイルツリー構造として表示される「アーカイブブラウザ」ビューで自動的に開きます。アーカイブ内のファイルは、ディスク上に展開することなく、開いて編集したり、XSLTやXQueryで検証または変換したりできます。
Tip.57.text=XSLTスタイルシートをデバッグするには、ウィンドウ → パースペクティブを開く → デバッガーからXSLTデバッガーパースペクティブに切り替えます。デバッガーパースペクティブは、Docbookのような複雑なスタイルシートをデバッグできるフル機能のXSLTデバッガーを提供します。
Tip.51.text=スペルミスをその場でチェックして修正します。オプション → 設定 / エディタ / スペルチェック → 自動スペルチェックで自動スペルチェックを有効にします。スペルミスの単語が強調表示されたら、その単語を右クリックしてスペルチェックサブメニューに進み、単語を学習するか、提案のいずれかと置き換えます。
Tip.23.helpID=設定-コンテンツ入力支援-注釈
Tip.10.text=オーサードキュメントの変更は、編集エリアの横にコールアウトボックス（吹き出し）として表示できるため、ドキュメントの編集やレビューでのコラボレーションが容易になります。コールアウトは、変更（挿入または削除）だけでなく、変更されたコンテンツや変更が行われた日付などの追加情報を表示するように設定できます。
Tip.19.text=複雑なXPath式は、XPathビルダーと呼ばれる特別なビューでXPath式に利用可能なコンテンツ入力支援アシスタントの助けを借りて作成できます。また、ビュー内で編集中のドキュメントに対して式を実行してテストすることもできます。ビューはメニューウィンドウ → ビューの表示から開きます。
Tip.80.text=ディレクトリ比較ツールとファイル比較ツールを使用すると、プロジェクトの異なるバージョン間の変更を簡単に追跡でき、ファイルの比較、マージ、コピーに適した機能を提供します。
Tip.100.text=XML Schema 1.0または1.1のインポート/インクルード階層を視覚化するには、リソース階層/依存関係ビューを使用できます。アクションはコンテキストメニューで利用できます。「リソース階層」と「リソース依存関係」です。
Tip.68.helpID=既存ドキュメントを開く
Tip.103.text=コンテキストメニューから「コンポーネントの依存関係」を選択することで、変数、関数、または名前付きテンプレートを参照するXSLTコンポーネントを調べることができます。例えば、XSLTテンプレートがどこから呼び出されているかを確認できます。
Tip.64.helpID=設定-コンテンツ入力支援-XSL
Tip.86.text=検索/置換ダイアログで「インクリメンタル」オプションを有効にすると、テキストパターンをインクリメンタルに検索できます。
Tip.67.text=検索→ファイル内の検索/置換オプションを使用して、複数のファイルを同時に検索および置換できます。置換正規表現では、Perl 5のような一致文字のグループを使用できます。
Tip.31.text=編集中のXSLTスタイルシートに変換シナリオを関連付けると、XSLT入力ビューにシナリオで設定されたXMLドキュメントのツリー構造が表示されます。このビューの要素と属性は、XSLT入力ビューからXSLTエディタにドラッグすることで、さまざまなXSLT構造に挿入できます。
Tip.36.helpID=XSLTリファクタリングアクション
Tip.102.text=RelaxNGスキーマの文法参照ツリーをチェックしたり、現在のRelax NGスキーマが他のどのRelax NGスキーマから参照されているかを確認するには、リソース階層/依存関係ビューを使用できます。アクションはコンテキストメニューで利用できます。「リソース階層」と「リソース依存関係」です。
Tip.76.text=XML以外のファイルのデフォルトエンコーディングは、オプション/設定 / エンコーディングオプションペインから設定できます。
Tip.45.text=使用するフォントは、エディタだけでなく、GUIテキストコンポーネントやその他のGUIコンポーネントについても、「フォント」設定ページから設定できます。これにより、ノートパソコンのような非常に小さいdpiファクターの設定でも、ユーザーフレンドリーでアクセスしやすいアプリケーションを実現できます。
