Tip.98.text=変換シナリオでXSLTプロセッサとして「Saxon-EE」を選択すると、スキーマ対応のXSLT変換を適用およびデバッグできるようになります。
Tip.3.text=リソースを開く/検索機能を使用すると、プロジェクト内のリソースを、そのコンテンツ内の検索または名前の検索のいずれかで簡単に見つけることができます。この機能を使用して、単純なテキスト検索だけでなく、Apache Lucene - クエリパーサー構文を使用した、ブール検索、XML検索などのより複雑な検索も実行できます。
