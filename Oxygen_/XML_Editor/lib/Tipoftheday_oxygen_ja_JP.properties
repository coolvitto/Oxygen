Tip.17.text=通常はコマンドラインから起動する外部ツールを設定するために、いくつかのエディタ変数（マクロ）が利用可能です。設定後は、各ツールをワンクリックで起動し、出力とエラーをアプリケーションウィンドウ内の別々の結果ペインで確認できます。
