Tip.1.text=メインファイルは、XMLプロジェクトの設定と開発を簡素化します。メインファイルは、モジュールのインポート/インクルードツリーのルートです。これらはプロジェクトレベルで定義され、検証、コンテンツ入力支援、リファクタリング、コンポーネント検索操作のコンテキストを決定するために自動的に使用されます。
