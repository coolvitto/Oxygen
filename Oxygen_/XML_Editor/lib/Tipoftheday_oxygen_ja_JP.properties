Tip.11.helpID=XProc変換シナリオ
Tip.107.helpID=オーサー-DITAマップ変換シナリオ
Tip.40.text=「エディタ / 編集モード / スキーマデザイン」設定ページでズーム倍率を変更することで、XML Schema 1.0、XML Schema 1.1、Relax NGダイアグラムのサイズを変更できます。
Tip.85.text=要素にカーソルを置いて、そのインデントを修正できます。コンテキストメニュー/ソースの「要素をプリティプリント」アクションを参照してください。これは、ドキュメント内の他の要素のインデントを変更したくない場合に便利です。
Tip.15.helpID=グリッドモードエディタ
Tip.13.helpID=検索/置換ダイアログ
Tip.54.text=XSLTデバッグパースペクティブで使用すると、<oXygen/>は出力のセクションを生成したXMLソースとXSLスタイルシートノードを調べる強力な方法を提供します。出力エリアのテキストのセクションをクリックするだけで、エディタがそれを生成したXMLファイルとXSLファイルの行を選択します。
Tip.99.text=オーサーモードの変更履歴機能により、削除および挿入されたコンテンツを作成者ごとに異なる色でマークすることで、複数の作成者間のコラボレーションが可能になります。
Tip.19.helpID=XPathビルダービュー
Tip.17.helpID=エディタ変数
Tip.52.text=データベースからデータをインポートするとき（ファイル → インポート → データベースデータ）、またはデータベースからXMLスキーマへの変換用の特別なウィザードでテーブルを直接選択する（ツール → データベース構造をXMLスキーマに変換）ことにより、データベースの構造からXMLスキーマを抽出します。
Tip.2.text=一部のXMLドキュメント、スタイルシート、またはスキーマは、メインファイルのコンテキストでのみ有効です。このようなモジュールを検証するには、メインファイルで検証を実行する検証シナリオを作成する必要があります。
Tip.66.text=HTMLドキュメントをインポートすると、その過程で整形式XMLになり、XHTML DTD宣言が挿入されるため、簡単にチェックして、最終的に編集してXHTML有効なドキュメントにすることができます。
Tip.71.text=追加のFOプロセッサは、「XML / XSLT-FO-XQuery / FOプロセッサ」設定ページから簡単に追加できます。
Tip.25.text=編集中のドキュメントはバックグラウンドで継続的に検証され、エラーは自動的に下線表示され、エディタパネル右側の概要ルーラーにマーカーが追加されます。概要ルーラーのマーカーをクリックすると、エラーの場所に直接移動できます。
Tip.39.text=XQueryプロファイラーは、XQuery変換のパフォーマンス問題を見つけて修正するのに役立ちます。これはXQueryデバッガーパースペクティブで利用可能で、デバッガーツールバーの時計のようなボタンを使用して有効にできます。
Tip.58.helpID=XMLドキュメントの検証
Tip.11.text=XProcパイプラインを作成して実行します。組み込みのXProcプロセッサはCalabashです。
Tip.73.text=編集中のドキュメントにはすべて、構文カラースキームがあります。各スキームの色は、オプション/設定 / エディタ / 色から設定できます。
Tip.28.helpID=設定-CSSバリデータ
Tip.63.helpID=新規ドキュメントの作成
Tip.6.text=XSLT 3.0サポートは、version属性が3.0に設定されている各XSLTスタイルシートに対して自動的に有効になります。oXygenは、XSLT 3.0スタイルシートのコンテンツ入力支援、変換とXSLT検証のサポート、更新されたアウトラインビュー、およびXSLT 3.0標準の新機能を処理する検索とリファクタリングアクションを提供します。
Tip.0.text=oXygenは「メインファイル」と呼ばれる新しい革新的なコンセプトを導入し、XMLプロジェクトの設定と開発を簡素化します。メインファイルは、モジュールのインポート/インクルードツリーのルートです。これらはプロジェクトレベルで定義され、検証、編集（コンテンツ入力支援とアウトライナー）、リファクタリング、コンポーネント検索操作のコンテキストを決定するために自動的に使用されます。このサポートは、XSD、XSL、RNGモジュールで利用できます。
Tip.90.text=Oxygen XML Authorエディタは、DITA Open Toolkitと緊密に統合されています。DITA Open ToolkitのANTビルドファイルに基づく高度にカスタマイズ可能な変換シナリオを使用して、DITAマップからPDFやHTMLなどの多数の出力形式を生成できます。
Tip.41.helpID=ドッキング可能なビューとエディタ
Tip.45.helpID=設定-フォント
Tip.42.text=テキストモードでエディタを分割して、同じファイルの2つのビューを並べて表示できます。これにより、ファイル内の特定の場所で編集しながら、同じファイルの別の場所からコンテンツをコピーできます。エディタを分割または分割解除するには、テキストエディタモードのポップアップメニューでも利用できる「分割」ツールバーボタンを使用します。
Tip.49.helpID=ステータス情報の表示
Tip.95.text=Open Document Format（ODF）ドキュメント（テキスト文書、スプレッドシート、プレゼンテーション）に保存されているXMLデータは、ODFドキュメントから直接抽出、検証、編集、およびXSLTまたはXQueryで他の形式に変換できます。ドキュメントは、「アーカイブブラウザ」と呼ばれる特別なビューでファイルツリー構造として表示され、参照できます。
Tip.20.helpID=Unicodeツールバー
Tip.24.helpID=XMLスキーマダイアグラムの紹介
Tip.35.text=XSLTスタイルシートで利用可能な「選択範囲からスタイルシートを作成」リファクタリングアクションを使用して、テンプレートを新しいスタイルシートにすばやく移動します。このアクションは、XSLリファクタリングツールバーとXSLTエディタのポップアップメニューで利用できます。
Tip.13.text=検索/置換ダイアログは、大文字と小文字を区別、XMLタグ内を検索、インクリメンタルサーチ、前方/後方方向、検索範囲を制限するXPathフィルターなどのオプションで調整できる、複数行の正規表現検索が可能です。
Tip.16.text=データベースパースペクティブを使用すると、データベースのテーブルまたはコレクションを参照したり、XQueryまたはSQLクエリを実行したり、データを検査または変更したり、XMLフィールドとコレクションにXMLスキーマを指定したりできます。データベースサポートには、多くの一般的なサーバーが含まれ、ネイティブXMLストレージとして動作するもの（MarkLogic、eXist）や、リレーショナルとXMLの両方を同時に扱うハイブリッド型（DB2、SQLServer、Oracle）があります。
Tip.97.helpID=XPath式の実行
Tip.61.text=<oXygen/>には、Docbook、DITA、TEIドキュメントを簡単に作成したり、ビジュアルなオーサーモードで編集したり、公開したりするための標準サポートが付属しています。
Tip.64.text=XSLスタイルシートの編集中に、コンテンツアシスタントがターゲット出力ドキュメントスキーマの要素を提供するように設定できます。「エディタ / コンテンツ入力支援 / XSL」設定ページを確認してください。
