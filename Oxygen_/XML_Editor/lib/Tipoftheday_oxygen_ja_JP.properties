Tip.32.text=XSLTエディタパネルで利用可能なポップアップメニューの検索サブメニューから、現在のプロジェクト内、またはすべてのインポート/インクルードファイル内で、参照を持つ任意のXSLTコンポーネント（変数、関数、名前付きテンプレート、現在のファイルの属性セット）のすべての参照を検索できます。検索アクションのショートカットは、オプション → 設定 → メニューショートカットキーから設定します。
Tip.93.text=XML Schema 1.0または1.1に注釈を付けるxs\:appinfo要素内のオートコンプリート用にカスタムスキーマを設定できます。デフォルトでは、Oxygenのオートコンプリートアシスタントを使用して、xs\:appinfo要素内にISO Schematronルールが提案されます。
Tip.101.text=XSLTスタイルシートのインポート/インクルード階層を視覚化するには、リソース階層/依存関係ビューを使用できます。アクションはコンテキストメニューで利用できます。「リソース階層」と「リソース依存関係」です。
Tip.46.text=検証やさまざまな検索操作では、結果をツリーテーブルレイアウトで表示し、異なる基準に基づいて結果をグループ化できます。
Tip.60.text=リモート編集は、HTTPおよびHTTPS上のSFTPとWebDAVを介してサポートされています。
Tip.47.text=マウスの中ボタンでエディタをクリックすると閉じることができます。
Tip.74.text=ツール → ドキュメント生成 → スキーマドキュメントメニューから、XML Schema 1.0または1.1のHTMLドキュメントを生成できます。ドキュメントページには、要素、属性、型などのモデルを説明する画像などが含まれます。
Tip.8.text=XMLドキュメントに注釈を付けると、ユーザーコメントはオーサービューにサイドコールアウト（吹き出し）として表示され、作成者やコメント時刻などの追加情報も表示されます。
Tip.69.helpID=プロジェクトビューの使用
Tip.28.text=CSS検証では、CSS2、CSS3などの異なるプロファイルと、例えば点字やスクリーンなどの異なるメディアタイプがサポートされています。文書化されている特定のブラウザ拡張はすべて、デフォルトで検証とコンテンツ入力支援でサポートされています。
