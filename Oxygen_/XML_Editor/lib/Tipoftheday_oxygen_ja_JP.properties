Tip.107.text=WebHelp出力は、DITAマップのコンテンツから、事前定義された変換シナリオを使用してすばやく生成できます。WebHelp出力では、マップ内のトピック参照がWebブラウザウィンドウの左フレームに目次として表示され、現在のトピックは右フレームに表示されます。トピックコンテンツはインデックス化され、検索可能です。順序付けられたトピックの順方向および逆方向へのナビゲーションも簡単です。
