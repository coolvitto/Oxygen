Tip.70.text=変換シナリオでXSLTプロセッサとして「Saxon-EE」を選択すると、スキーマ対応のXSLT変換を適用およびデバッグできるようになります。
Tip.53.helpID=コンテンツ入力支援で効率化
Tip.37.text=<oXygen/>は、幅広いスキーマ言語に対して整形式と妥当性をチェックできます\: XML Schema 1.0および1.1、Relax NG（フルおよびコンパクト構文）スキーマ、NVDLスキーマ、DTD。
