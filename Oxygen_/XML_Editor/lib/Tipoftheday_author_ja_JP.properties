Tip.3.text=oxy_editor CSS拡張関数を使用すると、オーサーモードでフォームベースのコントロールを使用して、属性と要素のテキスト値を直接編集できます。様々な実装が標準で利用可能です\: コンボボックス、チェックボックス、テキストフィールド、ポップアップ、カスタムオーサーアクションやURL選択ツールを呼び出すボタンなど。カスタムエディタを実装することもできます。
Tip.68.text=ZIPアーカイブは、ファイルツリー構造として表示される「アーカイブブラウザ」ビューで自動的に開きます。アーカイブ内のファイルは、ディスク上に展開することなく、開いて編集したり、XSLTやXQueryで検証または変換したりできます。
Tip.23.text=oXygenのビューは、ドッキング可能でフローティングにもできます。メインレイアウト内の任意の位置だけでなく、メインレイアウトの外側に別のウィンドウとしてドラッグすることもできます。また、「分割」ツールバーボタンを使用して、編集エリアを2つ以上のエディタに分割できます。初期レイアウトに戻すには、ウィンドウ → レイアウトのリセットに進みます。
Tip.53.text=コンテンツ入力支援で要素と属性に関する追加情報を提供するには、XML Schema 1.0および1.1の開発者がスキーマドキュメント内で「xs\:annotation」要素を使用して注釈を追加する必要があります。
