Tip.9.helpID=検索/置換ダイアログ
Tip.25.helpID=設定-コンテンツ入力支援
Tip.29.helpID=ドキュメントを閉じる
Tip.62.helpID=EPPO-マップにトピックを追加
Tip.40.helpID=新規ドキュメントの作成
Tip.18.text=デフォルトでは、XMLドキュメントの検証に使用される文法は、処理を高速化するためにキャッシュされます。「検証（キャッシュ）」ツールバーアクションを使用して、検証、コンテンツ入力支援、カタログのキャッシュを再構築します。
Tip.43.helpID=ファイル内のテキストを検索/置換
Tip.34.text=テキストモードでドキュメントを作成する場合は、オプション/設定/エディタ/フォーマット/ハード行折り返しオプションを有効にすると簡単です。これにより、現在編集中のテキスト行の長さが整形印刷の制限値に制限され、制限値に達すると自動的にカーソルが新しい行に移動します。
Tip.47.helpID=設定-FOプロセッサ
Tip.48.helpID=スペルチェックの使用
Tip.50.text=多くのエディタアクションのキーバインドは、オプション/設定 / メニューショートカットキーオプションペインから設定できます。
Tip.21.helpID=XPath式のコンテンツ入力支援
Tip.43.text=検索→ファイル内の検索/置換オプションを使用して、複数のファイルを同時に検索および置換できます。置換正規表現では、Perl 5のような一致文字のグループを使用できます。
Tip.49.text=編集中のドキュメントにはすべて、構文カラースキームがあります。各スキームの色は、オプション/設定 / エディタ / 色から設定できます。
Tip.12.text=通常はコマンドラインから起動する外部ツールを設定するために、いくつかのエディタ変数（マクロ）が利用可能です。設定後は、各ツールをワンクリックで起動し、出力とエラーをアプリケーションウィンドウ内の別々の結果ペインで確認できます。
Tip.65.text=データベース接続を設定して、データベースコレクションを参照し、WebDAV経由で読み取り/書き込みモードでデータにアクセスできます。WebDAVインターフェースを持つ任意のデータベースはOxygenでアクセスできます。例えば、組み込みサポートが提供されているMarkLogicなどです。
Tip.22.helpID=XPathツールバー
Tip.27.text=使用するフォントは、エディタだけでなく、GUIテキストコンポーネントやその他のGUIコンポーネントについても、「フォント」設定ページから設定できます。これにより、ノートパソコンのような非常に小さいdpiファクターの設定でも、ユーザーフレンドリーでアクセスしやすいアプリケーションを実現できます。
Tip.24.text=テキストモードでエディタを分割して、同じファイルの2つのビューを並べて表示できます。これにより、ファイル内の特定の場所で編集しながら、同じファイルの別の場所からコンテンツをコピーできます。エディタを分割または分割解除するには、テキストエディタモードのポップアップメニューでも利用できる「分割」ツールバーボタンを使用します。
Tip.21.text=XSLTスタイルシートやXPathツールバーでXPath値を編集する際、コンテキストに応じたコンテンツ入力支援が利用できます。アプリケーションは、その特定のスタイルシートコンテキストで利用可能な要素、属性、関数、軸、変数などを提供します。
Tip.59.helpID=テキストモードアクション
Tip.7.text=開発者であれば、プラグインやフレームワークをWebサイトでアドオンとして公開することで、他のユーザーに配布できます。ユーザーは、oXygenにリポジトリのURLを指定するだけで、新しいプラグインやフレームワークを簡単にインストールできます。利用可能なプラグインやフレームワークを参照し、インストールしたいものを選択できます。アドオンが変更されると、oXygenで更新通知がトリガーされます。
Tip.4.helpID=サポートされているXSLTプロセッサ
Tip.66.helpID=アーカイブの操作
Tip.1.text=リソースを開く/検索機能を使用すると、プロジェクト内のリソースを、そのコンテンツ内の検索または名前の検索のいずれかで簡単に見つけることができます。この機能を使用して、単純なテキスト検索だけでなく、Apache Lucene - クエリパーサー構文を使用した、ブール検索、XML検索などのより複雑な検索も実行できます。
Tip.72.text=Microsoft Word、OpenOffice Writer、またはWebブラウザからOxygen Authorにコピー＆ペーストすることで、ドキュメントのコンテンツをすばやく転送できます。オーサーモードに貼り付けると、可能な限り書式が保持されます。また、Microsoft ExcelやOpenOffice Calcからオーサーモードに表をコピー＆ペーストすると、表の書式が保持されます。
Tip.56.text=カタログマネージャーがパブリックIDとシステムIDをどのように解決するかを確認するには、XMLカタログオプションペインで「詳細出力」チェックボックスを選択してその出力を有効にできます。これにより、どのカタログファイルが使用されているかを確認することもできます。
Tip.73.helpID=オーサー-DITAマップ変換シナリオ
Tip.59.text=要素にカーソルを置いて、そのインデントを修正できます。コンテキストメニュー/ソースの「要素をプリティプリント」アクションを参照してください。これは、ドキュメント内の他の要素のインデントを変更したくない場合に便利です。
Tip.8.helpID=オーサーコールアウト
Tip.0.helpID=検証シナリオ
Tip.4.text=XSLT 3.0サポートは、version属性が3.0に設定されている各XSLTスタイルシートに対して自動的に有効になります。oXygenは、XSLT 3.0スタイルシートのコンテンツ入力支援、変換とXSLT検証のサポート、更新されたアウラインビュー、およびXSLT 3.0標準の新機能を処理する検索とリファクタリングアクションを提供します。
