Tip.38.text=リモート編集は、HTTPおよびHTTPS上のSFTPとWebDAVを介してサポートされています。
Tip.52.text=プロキシを介したWebサイトへのアクセスは、オプション/設定 / HTTP(S)/SFTP/プロキシ設定から設定できます。
Tip.2.text=SharePointリポジトリへのアクセスは簡単に使用できます。ホストアドレス、ユーザー名、パスワードを指定してSharePoint接続を設定するだけで、チェックアウト、ロック、編集、チェックインなどの操作でリモートコンテンツの編集を開始できます。
Tip.55.text=ディレクトリ比較ツールとファイル比較ツールを使用すると、プロジェクトの異なるバージョン間の変更を簡単に追跡でき、ファイルの比較、マージ、コピーに適した機能を提供します。
Tip.5.text=XSLT 3.0およびXQuery 3.0仕様はXPath 3.0に基づいているため、oXygenはXPathサポートを更新してXPath 3.0の新機能をカバーしています。新しいXPathビルダーを使用すると、XPath 3.0式を編集および実行できます。
Tip.69.text=XPathスキーマ対応式は、XPathビルダービューとXPathツールバーを使用して実行できます。式の種類に「XPath 2.0/3.1 SA」を選択するだけです。
Tip.66.text=Office Open XML / MS Office 2007ドキュメント（Word文書、Excelワークブック、PowerPointプレゼンテーション）に保存されているXMLデータは、OOXMLドキュメントから直接抽出、検証、編集、およびXSLTまたはXQueryで他の形式に変換できます。ドキュメントは、「アーカイブブラウザ」と呼ばれる特別なビューでファイルツリー構造として表示され、参照できます。
Tip.71.text=オーサーモードの変更履歴機能により、削除および挿入されたコンテンツを作成者ごとに異なる色でマークすることで、複数の作成者間のコラボレーションが可能になります。
Tip.22.text=相対XPath式は、XPathツールバーで、編集中のドキュメントの現在の要素を基準にして評価されます。
Tip.25.text=動的略語は、ドキュメント内に既に存在するすべての単語をインデックス化することで機能します。接頭辞を入力し、キーボードのCtrl+Spaceを押すと、その接頭辞で始まる単語がコンテンツ入力支援ウィンドウに表示されます。この機能はデフォルトでは無効ですが、オプション → エディタ/コンテンツ入力支援 / 機能 → 単語を学習（動的略語）から有効にできます。
Tip.39.text=<oXygen/>には、Docbook、DITA、TEIドキュメントを簡単に作成したり、ビジュアルなオーサーモードで編集したり、公開したりするための標準サポートが付属しています。
Tip.58.helpID=インポートの概要
Tip.11.text=データベースパースペクティブを使用すると、データベースのテーブルまたはコレクションを参照したり、XQueryまたはSQLクエリを実行したり、データを検査または変更したり、XMLフィールドとコレクションにXMLスキーマを指定したりできます。データベースサポートには、多くの一般的なサーバーが含まれ、ネイティブXMLストレージとして動作するもの（MarkLogic、eXist）や、リレーショナルとXMLの両方を同時に扱うハイブリッド型（DB2、SQLServer、Oracle）があります。
Tip.36.text=組み込みのシナリオを使用して、Docbook、DITA、TEIドキュメントをHTML、PDF、またはEPUBに公開します。
Tip.41.text=ファイル→新規作成ダイアログを使用して、DTDまたはXML Schema 1.0/1.1に基づくXMLドキュメントを簡単に作成できます。
Tip.27.helpID=設定-フォント
Tip.60.helpID=検索/置換ダイアログ
Tip.73.text=WebHelp出力は、DITAマップのコンテンツから、事前定義された変換シナリオを使用してすばやく生成できます。WebHelp出力では、マップ内のトピック参照がWebブラウザウィンドウの左フレームに目次として表示され、現在のトピックは右フレームに表示されます。トピックコンテンツはインデックス化され、検索可能です。順序付けられたトピックの順方向および逆方向へのナビゲーションも簡単です。
Tip.28.helpID=エディタパースペクティブ
Tip.20.text=CSS検証では、CSS2、CSS3などの異なるプロファイルと、例えば点字やスクリーンなどの異なるメディアタイプがサポートされています。文書化されている特定のブラウザ拡張はすべて、デフォルトで検証とコンテンツ入力支援でサポートされています。
Tip.63.helpID=DITAマップ変換
Tip.48.text=手動スペルチェックは、編集 → スペルチェックメニューで利用できます。
Tip.26.text=コンテンツ入力支援アシスタントは、候補リストで選択された提案の注釈を表示します。XML Schema 1.0または1.1に基づくドキュメントの場合、oXygenは、要素または属性に注釈がない場合、要素タイプまたは属性タイプの型階層を必要に応じて深く検索し、選択されたコンテンツ入力支援候補の横に最初に見つかった注釈を表示します。
Tip.6.text=XMLドキュメントに注釈を付けると、ユーザーコメントはオーサービューにサイドコールアウト（吹き出し）として表示され、作成者やコメント時刻などの追加情報も表示されます。
Tip.0.text=一部のXMLドキュメント、スタイルシート、またはスキーマは、メインファイルのコンテキストでのみ有効です。このようなモジュールを検証するには、メインファイルで検証を実行する検証シナリオを作成する必要があります。
Tip.42.helpID=XMLのフォーマットとインデント
Tip.41.helpID=新規ドキュメントの作成
Tip.46.helpID=XSL-FOプロセッサ
Tip.45.helpID=プロジェクトビューの使用
Tip.42.text=様々な行幅やインデントサイズに従って、XMLドキュメントを整形印刷できます。空要素を展開するかどうか、属性をアルファベット順にソートするかドキュメントの元の順序を保持するかを指定できます。空白を保持または削除する要素名の独自のリストを作成することもできます。
Tip.49.helpID=設定-色-構文ハイライト
Tip.20.helpID=設定-CSSバリデータ
Tip.57.text=ブックマークは現在のプロジェクトに関連付けられており、編集セッション間で永続的です。
Tip.51.text=XML以外のファイルのデフォルトエンコーディングは、オプション/設定 / エンコーディングオプションペインから設定できます。
Tip.23.helpID=ドッキング可能なビューとエディタ
Tip.24.helpID=ドッキング可能なビューとエディタ
Tip.35.text=XSL変換でSVG結果が生成される場合、統合されたSVGレンダラーを使用してそれを確認できます。「シナリオの編集」ダイアログの「出力」タブで「SVG」チェックボックスを選択する必要があります。SVGビューアーはツールメニューにもあります。既存のSVGファイルを開くために使用できます。
Tip.10.text=データベースからエクスポートされたXMLドキュメントをグリッドモードで開き、表形式で編集します。
Tip.13.text=複雑なXPath式は、XPathビルダーと呼ばれる特別なビューでXPath式に利用可能なコンテンツ入力支援アシスタントの助けを借りて作成できます。また、ビュー内で編集中のドキュメントに対して式を実行してテストすることもできます。ビューはメニューウィンドウ → ビューの表示から開きます。
Tip.19.text=多くの検証エンジンを使用してドキュメントを検証できます\: Xerces、libxml、Saxon Enterprise Edition。これらはオプション → 設定 / エディタ / カスタム検証で設定します。ここで独自のバリデータを追加および設定できます。
Tip.16.text=現在編集中のドキュメントのフォントサイズをすばやく変更するには、Ctrl+テンキーのプラス（+）を押して拡大するか、Ctrl+テンキーのマイナス（-）を押して縮小するか、同等のCtrl+マウスホイールスクロールショートカットを使用します。
Tip.61.text=ドキュメント内にスキーマが指定されていない場合でも、「検証対象を選択...」ツールバーボタンを使用するか、オプション → 設定 / エディタ / ドキュメントタイプ関連付けで定義されたデフォルトのスキーマ関連付けを使用して、スキーマに対して検証することが可能です。
Tip.68.helpID=アーカイブの操作
Tip.64.text=CJK（中国語、日本語、韓国語）入力方式の完全なサポートは、テキストモード、グリッドモード、オーサーモードのすべてで利用できます。入力方式は、挿入された文字がCJKコードページに属する場合、構成中のテキストを表示するスポットポップアップウィンドウを表示します。構成中のテキストは、最終的に属することになるドキュメントのコンテキスト内でエディタに表示され、そのテキストがまだ変換されるかユーザーによって確定される必要があることを示すスタイルで表示されます。
Tip.2.helpID=SharePoint接続の設定
Tip.64.helpID=ドキュメントの編集
Tip.6.helpID=オーサーコールアウト
Tip.71.helpID=オーサー変更履歴
Tip.67.text=Open Document Format（ODF）ドキュメント（テキスト文書、スプレッドシート、プレゼンテーション）に保存されているXMLデータは、ODFドキュメントから直接抽出、検証、編集、およびXSLTまたはXQueryで他の形式に変換できます。ドキュメントは、「アーカイブブラウザ」と呼ばれる特別なビューでファイルツリー構造として表示され、参照できます。
Tip.31.text=情報ビューは、整形式チェック、検証、入力中検証、変換などのアクションによって発行された情報ステータスメッセージのログです。このビューは、アクションの開始や終了などのイベントと、検証に使用されたスキーマやエラー数などのデータを記録します。各イベントの時刻も記録されます。ビューは、ウィンドウ → ビューの表示 → 情報から画面に表示されます。
Tip.35.helpID=結果プレビューペイン
Tip.36.helpID=組み込み変換シナリオ
Tip.45.text=プロジェクトから選択したファイルに対してバッチ検証を実行できます。
Tip.33.helpID=設定-エディタ-スペルチェック
Tip.34.helpID=設定-エディタ-フォーマット
Tip.37.helpID=XMLドキュメントの検証
Tip.39.helpID=ドキュメントタイプ
Tip.32.helpID=ファイルプロパティの表示
Tip.38.helpID=FTP/WebDAVの開く/保存
Tip.29.text=マウスの中ボタンでエディタをクリックすると閉じることができます。
Tip.30.helpID=画像プレビュー
Tip.15.text=テキストモードでXML要素と属性を、そのプレフィックスに応じて異なる色で表示します。色の追加、編集、削除は、オプション → 設定 → 色 / プレフィックスごとの要素/属性に進んで行います。
Tip.31.helpID=ステータス情報の表示
Tip.32.text=プロパティビューは、現在編集中のドキュメントに関する情報を表示します\: ファイルのパス、コンテンツタイプ、エンコーディング、文字数、方向（左から右または右から左）、インデントサイズ、関連付けられたドキュメントタイプなど。ビューは、ウィンドウ → ビューの表示 → プロパティから画面に表示されます。
Tip.9.text=検索/置換ダイアログは、大文字と小文字を区別、XMLタグ内を検索、インクリメンタルサーチ、前方/後方方向、検索範囲を制限するXPathフィルターなどのオプションで調整できる、複数行の正規表現検索が可能です。
Tip.62.text=DITAマップマネージャービューを使用すると、ドラッグアンドドロップまたは昇格/降格アクションを使用して、DITAマップ内のトピック参照を簡単に配置できます。
Tip.46.text=<oXygen/>にはApache FOPプロセッサがバンドルされているため、他のソフトウェアをインストールしなくてもPDFまたはPSドキュメントを生成できます。
Tip.60.text=検索/置換ダイアログで「インクリメンタル」オプションを有効にすると、テキストパターンをインクリメンタルに検索できます。
Tip.44.text=最後に作業したドキュメントを開くには、ファイル→最後に閉じたエディタを再度開くをクリックします。
Tip.47.text=追加のFOプロセッサは、「XML / XSLT-FO-XQuery / FOプロセッサ」設定ページから簡単に追加できます。
Tip.8.text=オーサードキュメントの変更は、編集エリアの横にコールアウトボックス（吹き出し）として表示できるため、ドキュメントの編集やレビューでのコラボレーションが容易になります。コールアウトは、変更（挿入または削除）だけでなく、変更されたコンテンツや変更が行われた日付などの追加情報を表示するように設定できます。
Tip.58.text=データベースコンテンツ、Microsoft Excelシート、およびレガシーテキストデータファイル（カンマ区切り値など）をXMLドキュメントにインポートできます。接続可能なのは\: Oracle、IBM DB2、Microsoft SQL Server、MySQL、またはJDBC接続をサポートするその他のデータベースサーバー。
Tip.63.text=Oxygen XML Authorエディタは、DITA Open Toolkitと緊密に統合されています。DITA Open ToolkitのANTビルドファイルに基づく高度にカスタマイズ可能な変換シナリオを使用して、DITAマップからPDFやHTMLなどの多数の出力形式を生成できます。
Tip.67.helpID=アーカイブファイルの編集
Tip.69.helpID=XPath式の実行
Tip.3.helpID=フォームコントロール
Tip.5.helpID=XPathツールバー
Tip.28.text=検証やさまざまな検索操作では、結果をツリーテーブルレイアウトで表示し、異なる基準に基づいて結果をグループ化できます。
Tip.7.helpID=アドオンのインストールと更新
Tip.14.text=キーボードにないUnicode文字を挿入するには、Unicodeツールバーとメニュー編集 → 文字マップから挿入にある文字マップダイアログを使用します。これにより、文字のコードとして直接、またはコードを使用した文字エンティティとして文字を挿入できます。
Tip.17.text=編集中のドキュメントはバックグラウンドで継続的に検証され、エラーは自動的に下線表示され、エディタパネル右側の概要ルーラーにマーカーが追加されます。概要ルーラーのマーカーをクリックすると、エラーの場所に直接移動できます。
Tip.65.helpID=WebDAV接続
Tip.1.helpID=リソースを開く/検索ビュー
Tip.33.text=スペルミスをその場でチェックして修正します。オプション → 設定 / エディタ / スペルチェック → 自動スペルチェックで自動スペルチェックを有効にします。スペルミスの単語が強調表示されたら、その単語を右クリックしてスペルチェックサブメニューに進み、単語を学習するか、提案のいずれかと置き換えます。
Tip.30.text=<oXygen/>で開くSVG、GIF、JPG、PNG、BMP画像は、プレビューパネルに表示されます。
Tip.70.helpID=サポートされているXSLTプロセッサ
